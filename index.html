y<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Shifat Prodhan</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0071e3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Shifat Pro">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1dPbbsHrDWj5ep7VBr1nGuE440i4kIq0m">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f5f5f7; color: #1d1d1f; margin: 0; }

        /* Apple Glass */
        .apple-blur {
            background: rgba(255,255,255,0.78);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .apple-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06);
        }
        .apple-input {
            background: #f2f2f7;
            border: 2px solid transparent;
            border-radius: 14px;
            transition: all 0.2s ease;
            font-weight: 500;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }
        .apple-input:focus {
            background: #ffffff;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
        }
        .apple-btn {
            background: #0071e3;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.18s cubic-bezier(.4,0,.2,1);
            border: none;
            cursor: pointer;
        }
        .apple-btn:hover { background: #0077ed; transform: scale(1.01); }
        .apple-btn:active { transform: scale(0.97); }
        .apple-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Spinner */
        .spinner {
            border: 2.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2.5px solid #fff;
            width: 18px; height: 18px;
            animation: spin 0.75s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .avatar-ring {
            width: 50px; height: 50px;
            border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(135deg, #0071e3, #34aadc);
            flex-shrink: 0;
        }
        .avatar-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        /* Upload area */
        .upload-zone {
            border: 2px dashed #d1d1d6;
            border-radius: 16px;
            background: #f9f9fb;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #0071e3;
            background: rgba(0,113,227,0.04);
        }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }

        /* Upload progress */
        .upload-progress {
            height: 4px;
            border-radius: 99px;
            background: #e5e5ea;
            overflow: hidden;
        }
        .upload-progress-bar {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #0071e3, #34aadc);
            transition: width 0.3s ease;
        }

        /* Tab indicator */
        .tab-active { background: #0071e3 !important; color: white !important; }

        /* Reaction pill */
        .reaction-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 99px;
            background: #f2f2f7;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.15s;
            user-select: none;
        }
        .reaction-pill:hover { background: #e5e5ea; transform: scale(1.05); }
        .reaction-pill:active { transform: scale(0.95); }
        .reaction-pill.reacted {
            background: rgba(0,113,227,0.1);
            border-color: rgba(0,113,227,0.25);
            color: #0071e3;
        }

        /* Reaction popup */
        .reaction-popup {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            background: white;
            border-radius: 99px;
            padding: 6px 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
            display: flex;
            gap: 6px;
            z-index: 100;
            white-space: nowrap;
        }
        .reaction-popup button {
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 8px;
        }
        .reaction-popup button:hover { transform: scale(1.4); background: #f2f2f7; }

        /* Post card hover */
        .post-card { transition: transform 0.2s, box-shadow 0.2s; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.05); }

        /* Image tab switch */
        .img-tab {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #6e6e73;
            transition: all 0.18s;
            font-family: inherit;
        }
        .img-tab.active { background: white; color: #0071e3; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        /* Toast */
        @keyframes toast-in { from { transform: translateY(20px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: scale(0.95); } }
        .toast { animation: toast-in 0.3s cubic-bezier(.4,0,.2,1); }
        .toast.out { animation: toast-out 0.25s forwards; }

        /* Ratio picker mobile */
        @media (max-width: 600px) {
            .ratio-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 6px !important; }
            .ratio-btn { padding: 8px 4px 6px !important; border-radius: 10px !important; }
        }

        /* Category Picker Trigger */
        .cat-trigger {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px;
            background: #f2f2f7;
            border: 2px solid transparent;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            text-align: left;
        }
        .cat-trigger:hover { background: #e8e8ed; }
        .cat-trigger.open { background: #ffffff; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.12); }

        /* Popup overlay (shared) */
        .picker-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.28);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-end; justify-content: center;
            padding: 0;
        }
        @media (min-width: 600px) {
            .picker-overlay { align-items: center; padding: 24px; }
        }

        /* Category Popup Sheet */
        .cat-popup {
            background: #ffffff;
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.14);
            width: 100%;
            max-width: 480px;
            padding: 8px 0 0;
            display: flex;
            flex-direction: column;
            max-height: 82vh;
        }
        @media (min-width: 600px) {
            .cat-popup { border-radius: 28px; max-height: 80vh; }
        }
        .cat-popup-handle {
            width: 36px; height: 4px;
            background: #d1d1d6; border-radius: 99px;
            margin: 8px auto 16px;
        }
        .cat-popup-title {
            padding: 0 20px 12px;
            font-size: 13px; font-weight: 800;
            letter-spacing: 0.8px; text-transform: uppercase;
            color: #6e6e73;
        }
        .cat-popup-scroll { 
            overflow-y: auto; 
            padding: 0 16px 8px; 
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }
        .cat-custom-footer {
            flex-shrink: 0;
            border-top: 1px solid #f2f2f7;
            padding: 12px 16px 20px;
            background: #fff;
        }
        .cat-option {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.13s;
            border: 2px solid transparent;
            margin-bottom: 4px;
        }
        .cat-option:hover { background: #f2f2f7; }
        .cat-option.selected {
            background: rgba(0,113,227,0.07);
            border-color: rgba(0,113,227,0.22);
        }
        .cat-option-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .cat-option-check {
            margin-left: auto;
            width: 22px; height: 22px; border-radius: 50%;
            background: #0071e3;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .cat-custom-input-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px 8px;
        }
        .cat-custom-input {
            flex: 1;
            background: #f2f2f7;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px; font-weight: 600;
            font-family: inherit;
            outline: none;
            transition: all 0.18s;
        }
        .cat-custom-input:focus { background: #fff; border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.12); }
        .cat-custom-add-btn {
            background: #0071e3; color: white;
            border: none; border-radius: 12px;
            padding: 12px 16px; font-weight: 700;
            font-size: 13px; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
            white-space: nowrap;
        }
        .cat-custom-add-btn:hover { background: #0077ed; }
        .cat-custom-add-btn:active { transform: scale(0.96); }
        .cat-divider { height: 1px; background: #f2f2f7; margin: 8px 16px; }

        /* Ratio Popup Sheet */
        .ratio-popup {
            background: #ffffff;
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.14);
            width: 100%; max-width: 480px;
            padding: 8px 0 0;
            overflow: hidden;
        }
        @media (min-width: 600px) {
            .ratio-popup { border-radius: 28px; }
        }
        .ratio-popup-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 20px 28px;
        }
        .ratio-popup-btn {
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 12px 6px 10px;
            background: #f2f2f7;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; gap: 8;
            transition: all 0.18s cubic-bezier(.4,0,.2,1);
            font-family: inherit;
            outline: none;
        }
        .ratio-popup-btn:hover { background: #e8e8ed; }
        .ratio-popup-btn.active {
            border-color: #0071e3;
            background: rgba(0,113,227,0.07);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
            transform: scale(1.04);
        }

        /* Ratio trigger button on form */
        .ratio-trigger {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px;
            background: #f2f2f7;
            border: 2px solid transparent;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
            font-size: 14px; font-weight: 600;
            width: 100%; text-align: left;
        }
        .ratio-trigger:hover { background: #e8e8ed; }
        .ratio-trigger.open { background: #ffffff; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.12); }

        /* Skeleton shimmer */
        @keyframes shimmer {
            0% { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f5 25%, #e8e8f0 50%, #f0f0f5 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 10px;
        }
        .skeleton-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        @media (max-width: 640px) {
            .create-form { padding: 20px 16px !important; }
            .main-padding { padding: 20px 12px !important; }
            .post-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
            .header-pad { padding: 12px 16px !important; }
            .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; flex-wrap: nowrap !important; }
            .filter-scroll::-webkit-scrollbar { display: none; }
            .edit-modal { border-radius: 20px !important; }
            .edit-modal-body { padding: 16px 20px 24px !important; }
            .edit-modal-header { padding: 20px 20px 0 !important; }
        }

        /* Safe area for notch phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 99px; }

        select { -webkit-appearance: none; appearance: none; cursor: pointer; }

        /* ─── ADMIN TABS ─── */
        .admin-tabs {
            display: flex; gap: 4px;
            background: #f2f2f7; border-radius: 16px;
            padding: 4px; margin-bottom: 32px;
        }
        .admin-tab-btn {
            flex: 1; padding: 10px 6px;
            border-radius: 12px; border: none;
            font-family: inherit; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: all 0.18s;
            background: transparent; color: #6e6e73;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            white-space: nowrap;
        }
        .admin-tab-btn.active { background: white; color: #0071e3; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .admin-tab-btn:hover:not(.active) { background: rgba(255,255,255,0.6); color: #1d1d1f; }

        /* ─── CLIENT LOGO GRID ─── */
        .client-logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 14px; margin-top: 8px;
        }
        .client-logo-card {
            background: white; border-radius: 18px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06);
            position: relative; transition: transform 0.2s, box-shadow 0.2s;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .client-logo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.1); }
        .client-logo-card img { width: 78%; height: 78%; object-fit: contain; border-radius: 8px; }
        .client-logo-card .logo-del-btn {
            position: absolute; top: 7px; right: 7px;
            width: 24px; height: 24px; border-radius: 50%;
            background: rgba(255,59,48,0); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.18s; font-size: 13px;
            opacity: 0; color: #ff3b30;
        }
        .client-logo-card:hover .logo-del-btn { opacity: 1; background: rgba(255,59,48,0.12); }
        .client-logo-card .logo-del-btn:hover { background: rgba(255,59,48,0.22); transform: scale(1.12); }
        .client-logo-card .logo-order-label {
            position: absolute; bottom: 6px; left: 0; right: 0;
            text-align: center; font-size: 10px; font-weight: 700; color: #c7c7cc;
        }

        /* ─── COMMENT MANAGE CARD ─── */
        .comment-manage-card {
            background: white; border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 0 0 0.5px rgba(0,0,0,0.05);
            padding: 14px 18px; transition: box-shadow 0.18s;
            display: flex; align-items: flex-start; gap: 12px;
        }
        .comment-manage-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.09); }

        /* ─── SETTINGS ─── */
        .settings-group {
            background: white; border-radius: 20px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.05), 0 0 0 0.5px rgba(0,0,0,0.05);
            padding: 22px 26px; margin-bottom: 18px;
        }
        .settings-group-title {
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; color: #6e6e73; margin-bottom: 14px;
        }

        /* Edit Modal */
        .edit-modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .edit-modal {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(0,0,0,0.06);
            width: 100%; max-width: 520px;
            overflow-y: auto;
            max-height: 92vh;
        }
        .edit-modal-header {
            padding: 24px 28px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .edit-modal-body { padding: 20px 28px 28px; }
